<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark rounded square background (like an app icon) -->
  <rect width="512" height="512" rx="110" fill="#0a0a0a"/>
  <defs>
    <linearGradient id="g" x1="256" y1="60" x2="256" y2="452" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#86cf3c"/>
      <stop offset="28%"  stop-color="#c8b820"/>
      <stop offset="52%"  stop-color="#f07020"/>
      <stop offset="74%"  stop-color="#e82272"/>
      <stop offset="100%" stop-color="#8020d8"/>
    </linearGradient>
  </defs>
  <!--
    C shape scaled to 80% of original (outer R=184, inner R=116, center=256,256)
    Gap angle ±40° from horizontal right
    Outer top-right:    (397, 138)
    Outer bottom-right: (397, 374)
    Inner top-right:    (345, 182)
    Inner bottom-right: (345, 330)
  -->
  <path
    d="M 397 138
       A 184 184 0 1 1 397 374
       L 345 330
       A 116 116 0 1 0 345 182
       Z"
    fill="url(#g)"
  />
</svg>
